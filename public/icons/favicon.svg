<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0720"/>
      <stop offset="1" stop-color="#2A0F49"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g fill="#FDE68A" opacity="0.95" filter="url(#soft)">
    <circle cx="360" cy="128" r="10"/>
    <circle cx="402" cy="158" r="6"/>
    <circle cx="442" cy="136" r="7"/>
    <circle cx="86" cy="364" r="9"/>
    <circle cx="126" cy="404" r="6"/>
    <circle cx="170" cy="382" r="7"/>
  </g>
  <text x="256" y="300" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="92" letter-spacing="14" fill="#FFFFFF">
    LUMINA
  </text>
</svg>

