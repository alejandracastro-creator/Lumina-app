[build]
  command = "npm ci && npm run build:web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions."schedule-notification"]
  schedule = "0 13,23 * * *"

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/_expo/*"
  to = "/_expo/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
